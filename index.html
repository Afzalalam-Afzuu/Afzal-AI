<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Afzal-AI</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fb;
    }

    .main-card {
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .input-box {
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    .tool-item:hover {
      background: #f1f1f1;
    }

    .mic-btn {
      border: none;
      background: transparent;
      font-size: 20px;
    }
  </style>
</head>

<body>

<!-- Header -->
<nav class="navbar bg-white shadow-sm px-3">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">Afzal-AI</span>
    <span class="ms-auto badge bg-primary">Industry v1.0</span>
     - Afzal-Al.Com

    <select id="modelSelect" class="form-select w-auto">
      <option value="gemini-1.5-flash">Afzal-AI 3 Flash</option>
      <option value="gemini-1.5-flash-8b">Afzal-AI 2.5 Flash</option>
      <option value="gemini-1.5-pro">Afzal-AI 3 Pro</option>
      <option value="gemini-1.5-pro-latest">Afzal-AI 2.5 Pro</option>
    </select>
  </div>
</nav>

<!-- Main -->
<div class="container py-5">

  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card main-card p-4 text-center">

        <!-- Greeting -->
        <h2 id="greeting" class="fw-bold mb-2" style="cursor:pointer;">
          Hi User
        </h2>

        <p class="text-muted mb-4">Where should we start?</p>

        <!-- Input -->
        <div class="input-group mb-3">
          <input id="inputBox" type="text" class="form-control input-box" placeholder="Ask Afzal AI...">
          <button id="micBtn" class="btn btn-light">🎤</button>
        </div>

        <!-- Tools -->
        <div class="dropdown mb-3">
          <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
            ⚙️ Tools
          </button>

          <ul class="dropdown-menu text-start">

            <li class="dropdown-item tool-item" data-type="chat">
              💬 <strong>Smart Chat</strong><br>
              <small class="text-muted">Ask anything instantly</small>
            </li>

            <li class="dropdown-item tool-item" data-type="image">
              📸 <strong>Create Image</strong><br>
              <small class="text-muted">Generate AI visuals</small>
            </li>

            <li class="dropdown-item tool-item" data-type="web">
              🌐 <strong>Web Search</strong><br>
              <small class="text-muted">Get latest data</small>
            </li>

          </ul>
        </div>

        <!-- Result -->
        <div id="result" class="text-start"></div>

      </div>

    </div>
  </div>

</div>

<!-- Footer -->
<footer class="bg-white border-top mt-4">
  <div class="container text-center py-3">

    <div class="fw-semibold">Afzal-AI</div>

    <div class="text-muted small">
      Smart AI Assistant for Learning & Automation
    </div>

    <div class="text-muted small mt-1">
      © 2026 Afzal-AI. All rights reserved.
    </div>

  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* ================= NAME ================= */
const greeting = document.getElementById("greeting");

let savedName = localStorage.getItem("username");
if (savedName) greeting.innerText = "Hi " + savedName;

greeting.onclick = () => {
  let name = prompt("Enter your name:");
  if (name) {
    localStorage.setItem("username", name);
    greeting.innerText = "Hi " + name;
  }
};

/* ================= VOICE ================= */
const micBtn = document.getElementById("micBtn");
const inputBox = document.getElementById("inputBox");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  const recognition = new SpeechRecognition();

  micBtn.onclick = () => {
    recognition.start();
    micBtn.innerText = "🎙️";
  };

  recognition.onresult = (e) => {
    inputBox.value = e.results[0][0].transcript;
  };

  recognition.onend = () => {
    micBtn.innerText = "🎤";
  };
}

/* ================= TOOLS ================= */
let selectedTool = "chat";

document.querySelectorAll(".tool-item").forEach(item => {
  item.onclick = () => {
    selectedTool = item.dataset.type;
  };
});

/* ================= API ================= */
const resultDiv = document.getElementById("result");

async function callGemini(prompt) {

  const model = document.getElementById("modelSelect").value;
  const API_KEY = "AIzaSyDc_OH3p5yapPhYuL4pSbytdUmjyf4wvSU";

  const url = `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${API_KEY}`;

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });

  const data = await res.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
}

/* ================= ENTER ================= */
inputBox.addEventListener("keypress", async (e) => {
  if (e.key === "Enter") {

    let prompt = inputBox.value;
    if (!prompt) return;

    resultDiv.innerHTML = `<div class="alert alert-info">Loading...</div>`;

    if (selectedTool === "image") prompt = "Create image: " + prompt;
    if (selectedTool === "web") prompt = "Search latest: " + prompt;

    const result = await callGemini(prompt);

    resultDiv.innerHTML = `
      <div class="card p-3 mt-3 shadow-sm">
        ${result}
      </div>`;
  }
});

</script>

</body>
</html>
